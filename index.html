<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>French voca</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-shell">
      <main class="main-panel">
        <section class="hero-card">
          <p class="eyebrow">French voca</p>
          <div class="day-nav" aria-label="Day 이동">
            <button id="day-prev" class="day-nav-button ghost-button" type="button" aria-label="이전 Day">←</button>
            <button id="day-title" class="day-title-button" type="button">불러오는 중...</button>
            <button id="day-next" class="day-nav-button ghost-button" type="button" aria-label="다음 Day">→</button>
          </div>
        </section>

        <section class="content-view">
          <div id="card-grid" class="card-grid"></div>
        </section>

        <section class="quiz-section">
          <div class="quiz-box">
            <div class="section-head">
              <p class="eyebrow">Quiz</p>
              <h3>빈칸 문제 10개</h3>
            </div>
            <div class="quiz-actions">
              <button id="check-quiz" type="button">정답 확인</button>
            </div>
            <div id="quiz-list" class="quiz-list"></div>
          </div>
        </section>
      </main>
    </div>

    <template id="word-card-template">
      <article class="word-card">
        <div class="card-top">
          <span class="pos-badge"></span>
          <span class="word-index"></span>
        </div>
        <h3 class="word-text"></h3>
        <p class="word-meaning"></p>
        <p class="word-example"></p>
        <p class="word-example-ko"></p>
      </article>
    </template>

    <template id="quiz-item-template">
      <article class="quiz-item">
        <div class="quiz-head">
          <strong class="quiz-number"></strong>
        </div>
        <p class="quiz-sentence"></p>
        <p class="quiz-feedback"></p>
      </article>
    </template>

    <script src="./script.js" type="module"></script>
  </body>
</html>
